openapi: 3.0.3
info:
  title: Auth Service API
  version: 1.0.0
  description: |
    Contrato HTTP do auth-service para consumo pelo API Gateway e demais clientes.
    Esta spec cobre endpoints de autenticacao e health checks.
  license:
    name: Uso educacional
    url: https://example.com/educational-use

security: []

servers:
  - url: http://localhost:8081
    description: Execucao local
  - url: http://auth-service:8081
    description: Docker Compose network

tags:
  - name: Health
    description: Endpoints de saude do servico
  - name: Auth
    description: Endpoints de autenticacao

paths:
  /health/live:
    get:
      tags: [Health]
      summary: Liveness probe
      operationId: getLiveHealth
      responses:
        '200':
          description: Servico vivo
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/StatusResponse'
              examples:
                default:
                  value:
                    status: live

  /health/ready:
    get:
      tags: [Health]
      summary: Readiness probe
      operationId: getReadyHealth
      responses:
        '200':
          description: Servico pronto
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/StatusResponse'
              examples:
                default:
                  value:
                    status: ready

  /auth/health:
    get:
      tags: [Health]
      summary: Health especifico do auth-service
      operationId: getAuthHealth
      responses:
        '200':
          description: Auth service operacional
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/AuthHealthResponse'
              examples:
                default:
                  value:
                    service: auth-service
                    status: ok

  /auth/register:
    post:
      tags: [Auth]
      summary: Registrar usuario
      operationId: registerUser
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/RegisterRequest'
            examples:
              valid:
                value:
                  email: user@example.com
                  password: StrongPassword123!
      responses:
        '201':
          description: Usuario registrado com sucesso
          headers:
            X-Request-Id:
              $ref: '#/components/headers/XRequestId'
            X-Correlation-Id:
              $ref: '#/components/headers/XCorrelationId'
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/RegisterResponse'
              examples:
                success:
                  value:
                    user_id: user-123
                    credential_id: cred-123
                    access_token: eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9...
                    refresh_token: rtkn_abc123
                    token_type: Bearer
                    expires_in: 900
        '400':
          $ref: '#/components/responses/BadRequest'
        '409':
          $ref: '#/components/responses/Conflict'
        '500':
          $ref: '#/components/responses/InternalError'

  /auth/login:
    post:
      tags: [Auth]
      summary: Autenticar usuario
      operationId: loginUser
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/LoginRequest'
            examples:
              valid:
                value:
                  email: user@example.com
                  password: StrongPassword123!
      responses:
        '200':
          description: Login realizado com sucesso
          headers:
            X-Request-Id:
              $ref: '#/components/headers/XRequestId'
            X-Correlation-Id:
              $ref: '#/components/headers/XCorrelationId'
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/TokenResponse'
              examples:
                success:
                  value:
                    user_id: user-123
                    access_token: eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9...
                    refresh_token: rtkn_abc123
                    token_type: Bearer
                    expires_in: 900
        '400':
          $ref: '#/components/responses/BadRequest'
        '401':
          $ref: '#/components/responses/Unauthorized'
        '429':
          $ref: '#/components/responses/TooManyRequests'
        '500':
          $ref: '#/components/responses/InternalError'

  /auth/refresh:
    post:
      tags: [Auth]
      summary: Renovar access token
      operationId: refreshAccessToken
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/RefreshRequest'
            examples:
              valid:
                value:
                  refresh_token: rtkn_abc123
      responses:
        '200':
          description: Token renovado com sucesso
          headers:
            X-Request-Id:
              $ref: '#/components/headers/XRequestId'
            X-Correlation-Id:
              $ref: '#/components/headers/XCorrelationId'
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/TokenResponse'
              examples:
                success:
                  value:
                    user_id: user-123
                    access_token: eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9...
                    refresh_token: rtkn_rotated_456
                    token_type: Bearer
                    expires_in: 900
        '400':
          $ref: '#/components/responses/BadRequest'
        '401':
          $ref: '#/components/responses/Unauthorized'
        '429':
          $ref: '#/components/responses/TooManyRequests'
        '500':
          $ref: '#/components/responses/InternalError'

  /auth/logout:
    post:
      tags: [Auth]
      summary: Revogar refresh token atual
      operationId: logoutSession
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/LogoutRequest'
            examples:
              valid:
                value:
                  refresh_token: rtkn_abc123
      responses:
        '204':
          description: Sessao revogada com sucesso
          headers:
            X-Request-Id:
              $ref: '#/components/headers/XRequestId'
            X-Correlation-Id:
              $ref: '#/components/headers/XCorrelationId'
        '400':
          $ref: '#/components/responses/BadRequest'
        '401':
          $ref: '#/components/responses/Unauthorized'
        '500':
          $ref: '#/components/responses/InternalError'

components:
  headers:
    XRequestId:
      description: ID unico da requisicao
      schema:
        type: string
    XCorrelationId:
      description: ID de correlacao para rastreabilidade distribuida
      schema:
        type: string

  schemas:
    StatusResponse:
      type: object
      required: [status]
      properties:
        status:
          type: string
          enum: [live, ready]

    AuthHealthResponse:
      type: object
      required: [service, status]
      properties:
        service:
          type: string
          example: auth-service
        status:
          type: string
          example: ok

    RegisterRequest:
      type: object
      required: [email, password]
      properties:
        email:
          type: string
          format: email
          example: user@example.com
        password:
          type: string
          format: password
          minLength: 8
          example: StrongPassword123!

    LoginRequest:
      type: object
      required: [email, password]
      properties:
        email:
          type: string
          format: email
          example: user@example.com
        password:
          type: string
          format: password
          example: StrongPassword123!

    RefreshRequest:
      type: object
      required: [refresh_token]
      properties:
        refresh_token:
          type: string
          example: rtkn_abc123

    LogoutRequest:
      type: object
      required: [refresh_token]
      properties:
        refresh_token:
          type: string
          example: rtkn_abc123

    RegisterResponse:
      allOf:
        - $ref: '#/components/schemas/TokenResponse'
        - type: object
          required: [credential_id]
          properties:
            credential_id:
              type: string
              example: cred-123

    TokenResponse:
      type: object
      required: [user_id, access_token, refresh_token, token_type, expires_in]
      properties:
        user_id:
          type: string
          example: user-123
        access_token:
          type: string
          description: JWT de acesso
          example: eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9...
        refresh_token:
          type: string
          description: Token de refresh para rotacao de sessao
          example: rtkn_abc123
        token_type:
          type: string
          example: Bearer
        expires_in:
          type: integer
          format: int64
          description: TTL do access token em segundos
          example: 900

    ErrorResponse:
      type: object
      required: [code, message]
      properties:
        code:
          type: string
          enum:
            - INVALID_ARGUMENT
            - UNAUTHORIZED
            - FORBIDDEN
            - NOT_FOUND
            - CONFLICT
            - INTERNAL
            - TOO_MANY_REQUESTS
        message:
          type: string
        request_id:
          type: string
        correlation_id:
          type: string

  responses:
    BadRequest:
      description: Erro de validacao de entrada
      content:
        application/json:
          schema:
            $ref: '#/components/schemas/ErrorResponse'
          examples:
            invalidPayload:
              value:
                code: INVALID_ARGUMENT
                message: invalid request body
                request_id: req-001
                correlation_id: corr-001

    Unauthorized:
      description: Credenciais invalidas ou token invalido
      content:
        application/json:
          schema:
            $ref: '#/components/schemas/ErrorResponse'
          examples:
            invalidCredentials:
              value:
                code: UNAUTHORIZED
                message: invalid credentials
                request_id: req-002
                correlation_id: corr-002

    Conflict:
      description: "Conflito de estado (ex.: email ja registrado)"
      content:
        application/json:
          schema:
            $ref: '#/components/schemas/ErrorResponse'
          examples:
            emailAlreadyExists:
              value:
                code: CONFLICT
                message: email already registered
                request_id: req-003
                correlation_id: corr-003

    TooManyRequests:
      description: Limite de taxa excedido
      content:
        application/json:
          schema:
            $ref: '#/components/schemas/ErrorResponse'
          examples:
            rateLimit:
              value:
                code: TOO_MANY_REQUESTS
                message: rate limit exceeded, please try again later
                request_id: req-004
                correlation_id: corr-004

    InternalError:
      description: Falha interna nao tratada
      content:
        application/json:
          schema:
            $ref: '#/components/schemas/ErrorResponse'
          examples:
            internal:
              value:
                code: INTERNAL
                message: internal server error
                request_id: req-005
                correlation_id: corr-005
